              f.write(content)

          # ====================== CREATE registry.js ======================
          registry = "export const dentists = [\n"
          for d in full_dentists:
              registry += "    {\n"
              for k, v in d.items():
                  if isinstance(v, list):
                      registry += f"        {k}: {v},\n"
                  elif isinstance(v, str):
                      registry += f"        {k}: \"{v}\",\n"
                  else:
                      registry += f"        {k}: {v},\n"
              registry += "    },\n"
          registry += "];\n"

          with open("registry.js", "w", encoding="utf-8") as f:
