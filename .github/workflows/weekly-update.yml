name: Weekly Full Site Update – index.html + registry.js + sitemap.xml + providers.json

on:
  schedule:
    - cron: '0 13 * * 1'   # Every Monday at 13:00 UTC = 9:00 AM Eastern
  workflow_dispatch:        # Manual trigger button in GitHub

jobs:
