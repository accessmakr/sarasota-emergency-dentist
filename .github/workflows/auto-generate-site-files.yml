name: Auto-Generate pages.json + registry.js + sitemap.xml

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

# Required so github-actions[bot] can push changes back to the repo
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate pages.json, registry.js & sitemap.xml
        run: node generate-files.js

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Fixed: registry.js is now inside the js/ folder
          git add pages.json js/registry.js sitemap.xml
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate pages.json, js/registry.js, sitemap.xml (dynamic + subfolders support)"
            git push
          fi
