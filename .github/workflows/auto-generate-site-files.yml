name: Auto-Generate Site Files (A to Z Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Allows script to see real file modification dates

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Surgical Generation Script
        run: node generate-files.js

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add all three generated files
          git add pages.json js/registry.js sitemap.xml
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: A-to-Z surgical update (Clean URLs + Timestamps)"
            git push
          fi
